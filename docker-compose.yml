services:
  landing:
    build:
      context: .
    image: aura-landing:${APP_ENV:-prod}
    container_name: aura-landing
    restart: unless-stopped
    ports:
      - "${LANDING_PORT:-3000}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
